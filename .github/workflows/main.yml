name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: 🔨 Build with Maven
        run: mvn clean package -B
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShardPlugin-${{ github.sha }}
          path: target/ShardPlugin-*.jar
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: 🔨 Build with Maven
        run: mvn clean package -B
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/ShardPlugin-*.jar
          name: "ShardPlugin ${{ github.ref_name }}"
          body: |
            ## 💎 ShardPlugin ${{ github.ref_name }}
            ### Installation
            1. Drop the `.jar` into `plugins/`
            2. Install [PlaceholderAPI](https://www.spigotmc.org/resources/placeholderapi.6245/)
            3. Restart & configure `config.yml`
            4. Add `%shards_amount%` to your scoreboard plugin
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
